<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — theweft.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f0;
      --bg-card: #ffffff;
      --text-primary: #1a1916;
      --text-secondary: #6b6860;
      --text-tertiary: #9e9c98;
      --border: rgba(26,25,22,0.12);
      --border-mid: rgba(26,25,22,0.2);
      --display: 'Fraunces', Georgia, serif;
      --mono: ui-monospace, 'Cascadia Code', Menlo, monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --bg-card: #1c1c1a;
        --text-primary: #f0ede6;
        --text-secondary: #9e9c98;
        --text-tertiary: #6b6860;
        --border: rgba(240,237,230,0.1);
        --border-mid: rgba(240,237,230,0.18);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .site-header {
      border-bottom: 0.5px solid var(--border-mid);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }

    .site-name {
      font-family: var(--display);
      font-weight: 300;
      font-size: 18px;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .site-name:hover { color: var(--text-secondary); }

    .site-nav { display: flex; gap: 1.5rem; }

    .site-nav a {
      font-size: 11px;
      color: var(--text-tertiary);
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.15s;
    }

    .site-nav a:hover { color: var(--text-primary); }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem 8rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      text-decoration: none;
      margin-bottom: 3rem;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--text-primary); }

    .post-header {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 0.5px solid var(--border);
    }

    .post-meta {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 1.25rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    h1 {
      font-family: var(--display);
      font-size: 38px;
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -1px;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }

    .post-excerpt-lede {
      font-family: var(--display);
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* ── Post body ── */
    .post-body {
      font-size: 16px;
      line-height: 1.8;
    }

    .post-body p { margin-bottom: 1.4em; }

    .post-body h2,
    .post-body h3 {
      font-family: var(--display);
      font-weight: 300;
      margin-top: 2.5em;
      margin-bottom: 0.75em;
      line-height: 1.25;
      letter-spacing: -0.5px;
    }

    .post-body h2 { font-size: 26px; }
    .post-body h3 { font-size: 20px; font-style: italic; }

    .post-body ul,
    .post-body ol { margin: 0 0 1.4em 1.5em; }

    .post-body li { margin-bottom: 0.4em; }

    .post-body blockquote {
      border-left: 2px solid var(--border-mid);
      margin: 2em 0;
      padding: 0.75em 0 0.75em 1.5em;
      font-family: var(--display);
      font-style: italic;
      font-size: 18px;
      font-weight: 300;
      color: var(--text-secondary);
    }

    .post-body code {
      font-family: var(--mono);
      font-size: 0.85em;
      background: var(--bg-card);
      border: 0.5px solid var(--border-mid);
      padding: 0.15em 0.35em;
      border-radius: 2px;
    }

    .post-body pre {
      background: var(--bg-card);
      border: 0.5px solid var(--border-mid);
      padding: 1.5rem;
      border-radius: 4px;
      overflow-x: auto;
      margin: 1.5em 0;
    }

    .post-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .post-body hr {
      border: none;
      border-top: 0.5px solid var(--border);
      margin: 3em 0;
    }

    .post-body a {
      color: var(--text-primary);
      text-decoration: underline;
      text-decoration-color: var(--border-mid);
    }

    .post-body a:hover { text-decoration-color: var(--text-secondary); }

    .post-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 0.5px solid var(--border);
    }

    .tag-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.75rem;
    }

    .post-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .tag {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 0.5px solid var(--border-mid);
      color: var(--text-tertiary);
      border-radius: 2px;
    }

    .loading, .error {
      font-size: 13px;
      color: var(--text-tertiary);
      padding: 3rem 0;
      letter-spacing: 0.04em;
    }

    .site-footer {
      border-top: 0.5px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .site-header { padding: 1rem; }
      main { padding: 2rem 1rem 4rem; }
      h1 { font-size: 28px; }
      .site-nav { display: none; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="/" class="site-name">the weft</a>
  <nav class="site-nav">
    <a href="/index.html">Signals</a>
    <a href="/blog.html">Writing</a>
    <a href="/about.html">About</a>
  </nav>
</header>

<main id="main">
  <p class="loading">Loading…</p>
</main>

<footer class="site-footer">
  theweft.net &mdash; content strategy &amp; public services
</footer>

<script>
  const WORKER_URL = "https://notion-signals-proxy.256ysfqc5d.workers.dev";

  function formatDate(dateStr) {
    if (!dateStr) return "";
    return new Date(dateStr).toLocaleDateString("en-GB", {
      day: "numeric", month: "long", year: "numeric"
    });
  }

  async function loadPost() {
    const main = document.getElementById("main");
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    if (!slug) {
      main.innerHTML = `<p class="error">No post specified.</p>`;
      return;
    }

    try {
      const res = await fetch(`${WORKER_URL}/posts/${slug}`);
      if (res.status === 404) throw new Error("Post not found");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { post } = await res.json();

      document.title = `${post.title} — theweft.net`;

      main.innerHTML = `
        <a href="/blog.html" class="back-link">← Writing</a>

        <div class="post-header">
          <div class="post-meta">
            <span>${formatDate(post.published)}</span>
            ${post.tags.length ? `<span>${post.tags.join(" · ")}</span>` : ""}
          </div>
          <h1>${post.title}</h1>
          ${post.excerpt ? `<p class="post-excerpt-lede">${post.excerpt}</p>` : ""}
        </div>

        <div class="post-body">${post.body}</div>

        ${post.tags.length ? `
          <div class="post-footer">
            <p class="tag-label">Filed under</p>
            <div class="post-tags">
              ${post.tags.map(t => `<span class="tag">${t}</span>`).join("")}
            </div>
          </div>
        ` : ""}
      `;

    } catch (err) {
      main.innerHTML = `
        <a href="/blog.html" class="back-link">← Writing</a>
        <p class="error">${err.message}</p>
      `;
    }
  }

  loadPost();
</script>
</body>
</html>

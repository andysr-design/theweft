<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — theweft.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f0;
      --bg-card: #ffffff;
      --text-primary: #1a1916;
      --text-secondary: #6b6860;
      --text-tertiary: #9e9c98;
      --border: rgba(26,25,22,0.12);
      --border-mid: rgba(26,25,22,0.2);
      --display: 'Fraunces', Georgia, serif;
      --mono: ui-monospace, 'Cascadia Code', Menlo, monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --bg-card: #1c1c1a;
        --text-primary: #f0ede6;
        --text-secondary: #9e9c98;
        --text-tertiary: #6b6860;
        --border: rgba(240,237,230,0.1);
        --border-mid: rgba(240,237,230,0.18);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .site-header {
      border-bottom: 0.5px solid var(--border-mid);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }

    .site-name {
      font-family: var(--display);
      font-weight: 300;
      font-size: 18px;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .site-name:hover { color: var(--text-secondary); }

    .site-nav { display: flex; gap: 1.5rem; }

    .site-nav a {
      font-size: 11px;
      color: var(--text-tertiary);
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.15s;
    }

    .site-nav a:hover,
    .site-nav a.active { color: var(--text-primary); }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .page-header {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 0.5px solid var(--border);
    }

    .page-label {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: var(--display);
      font-size: 42px;
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -1px;
      color: var(--text-primary);
    }

    .page-desc {
      margin-top: 0.75rem;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .post-list { list-style: none; }

    .post-item {
      padding: 2rem 0;
      border-bottom: 0.5px solid var(--border);
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .post-meta {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.6rem;
      display: flex;
      gap: 1.5rem;
    }

    .post-title a {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 300;
      line-height: 1.3;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .post-title a:hover { color: var(--text-secondary); }

    .post-excerpt {
      margin-top: 0.6rem;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .post-tags {
      margin-top: 0.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 0.5px solid var(--border-mid);
      color: var(--text-tertiary);
      border-radius: 2px;
    }

    .loading, .error, .empty {
      font-size: 13px;
      color: var(--text-tertiary);
      padding: 3rem 0;
      letter-spacing: 0.04em;
    }

    .site-footer {
      border-top: 0.5px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .site-header { padding: 1rem; }
      main { padding: 2rem 1rem 4rem; }
      h1 { font-size: 32px; }
      .site-nav { display: none; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="/" class="site-name">the weft</a>
  <nav class="site-nav">
    <a href="/index.html">Signals</a>
    <a href="/blog.html" class="active">Writing</a>
    <a href="/about.html">About</a>
  </nav>
</header>

<main>
  <div class="page-header">
    <p class="page-label">Writing</p>
    <h1>Notes on learning<br>through making</h1>
    <p class="page-desc">Giving form to public services through design.</p>
  </div>

  <ul class="post-list" id="post-list">
    <li class="loading">Loading posts…</li>
  </ul>
</main>

<footer class="site-footer">
  theweft.net &mdash; content strategy &amp; public services
</footer>

<script>
  const WORKER_URL = "https://notion-signals-proxy.256ysfqc5d.workers.dev";

  function formatDate(dateStr) {
    if (!dateStr) return "";
    return new Date(dateStr).toLocaleDateString("en-GB", {
      day: "numeric", month: "long", year: "numeric"
    });
  }

  async function loadPosts() {
    const list = document.getElementById("post-list");
    try {
      const res = await fetch(`${WORKER_URL}/posts`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { posts } = await res.json();

      if (!posts.length) {
        list.innerHTML = `<li class="empty">No posts yet. Check back soon.</li>`;
        return;
      }

      list.innerHTML = posts.map((post, i) => `
        <li class="post-item" style="animation-delay: ${i * 0.07}s">
          <div class="post-meta">
            <span>${formatDate(post.published)}</span>
            ${post.tags.length ? `<span>${post.tags.join(" · ")}</span>` : ""}
          </div>
          <div class="post-title">
            <a href="/post.html?slug=${post.slug}">${post.title}</a>
          </div>
          ${post.excerpt ? `<p class="post-excerpt">${post.excerpt}</p>` : ""}
        </li>
      `).join("");

    } catch (err) {
      list.innerHTML = `<li class="error">Couldn't load posts — ${err.message}</li>`;
    }
  }

  loadPosts();
</script>
</body>
</html>

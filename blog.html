<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — theweft.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1814;
      --paper: #f5f1ea;
      --warm-mid: #8c7b6b;
      --accent: #b85c2c;
      --rule: #d4c9b8;
      --serif: 'Libre Baskerville', Georgia, serif;
      --mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--serif);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--rule);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 2rem;
    }

    .site-name {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--warm-mid);
      text-decoration: none;
    }

    .site-name:hover { color: var(--accent); }

    nav { display: flex; gap: 1.5rem; margin-left: auto; }

    nav a {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--warm-mid);
      text-decoration: none;
    }

    nav a:hover, nav a.active { color: var(--ink); }

    /* ── Page layout ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .page-header {
      margin-bottom: 3.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--rule);
    }

    .page-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm-mid);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .page-desc {
      margin-top: 1rem;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--warm-mid);
      font-style: italic;
    }

    /* ── Post list ── */
    .post-list {
      list-style: none;
    }

    .post-item {
      padding: 2rem 0;
      border-bottom: 1px solid var(--rule);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .post-meta {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--warm-mid);
      margin-bottom: 0.6rem;
      display: flex;
      gap: 1.5rem;
    }

    .post-title a {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .post-title a:hover { color: var(--accent); }

    .post-excerpt {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      line-height: 1.7;
      color: #5a5047;
    }

    .post-tags {
      margin-top: 0.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--rule);
      color: var(--warm-mid);
      border-radius: 2px;
    }

    /* ── States ── */
    .loading, .error, .empty {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--warm-mid);
      padding: 3rem 0;
      letter-spacing: 0.04em;
    }

    .error { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <a href="/" class="site-name">theweft.net</a>
  <nav>
    <a href="/signals.html">Signals</a>
    <a href="/blog.html" class="active">Writing</a>
    <a href="/about.html">About</a>
  </nav>
</header>

<main>
  <div class="page-header">
    <p class="page-label">Writing</p>
    <h1>Notes on building<br>at the edge of things</h1>
    <p class="page-desc">Thinking out loud about design, technology, and what happens when you make them rub together.</p>
  </div>

  <ul class="post-list" id="post-list">
    <li class="loading">Loading posts…</li>
  </ul>
</main>

<script>
  const WORKER_URL = "https://notion-signals-proxy.256ysfqc5d.workers.dev";

  function formatDate(dateStr) {
    if (!dateStr) return "";
    return new Date(dateStr).toLocaleDateString("en-GB", {
      day: "numeric", month: "long", year: "numeric"
    });
  }

  async function loadPosts() {
    const list = document.getElementById("post-list");

    try {
      const res = await fetch(`${WORKER_URL}/posts`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { posts } = await res.json();

      if (!posts.length) {
        list.innerHTML = `<li class="empty">No posts yet. Check back soon.</li>`;
        return;
      }

      list.innerHTML = posts.map((post, i) => `
        <li class="post-item" style="animation-delay: ${i * 0.07}s">
          <div class="post-meta">
            <span>${formatDate(post.published)}</span>
            ${post.tags.length ? `<span>${post.tags.join(" · ")}</span>` : ""}
          </div>
          <div class="post-title">
            <a href="/post.html?slug=${post.slug}">${post.title}</a>
          </div>
          ${post.excerpt ? `<p class="post-excerpt">${post.excerpt}</p>` : ""}
        </li>
      `).join("");

    } catch (err) {
      list.innerHTML = `<li class="error">Couldn't load posts — ${err.message}</li>`;
    }
  }

  loadPosts();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signals — The Weft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --bg-card: #ffffff;
      --text-primary: #1a1916;
      --text-secondary: #6b6860;
      --text-tertiary: #9e9c98;
      --border: rgba(26,25,22,0.12);
      --border-mid: rgba(26,25,22,0.2);

      --tag-semantic-bg: #E6F1FB;
      --tag-semantic-border: #85B7EB;
      --tag-semantic-text: #0C447C;

      --tag-barriers-bg: #EAF3DE;
      --tag-barriers-border: #97C459;
      --tag-barriers-text: #3B6D11;

      --tag-frantic-bg: #FAEEDA;
      --tag-frantic-border: #EF9F27;
      --tag-frantic-text: #854F0B;

      --tag-lore-bg: #FAECE7;
      --tag-lore-border: #F0997B;
      --tag-lore-text: #712B13;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --bg-card: #1c1c1a;
        --text-primary: #f0ede6;
        --text-secondary: #9e9c98;
        --text-tertiary: #6b6860;
        --border: rgba(240,237,230,0.1);
        --border-mid: rgba(240,237,230,0.18);

        --tag-semantic-bg: rgba(12,68,124,0.2);
        --tag-semantic-border: #185FA5;
        --tag-semantic-text: #85B7EB;

        --tag-barriers-bg: rgba(39,80,10,0.2);
        --tag-barriers-border: #3B6D11;
        --tag-barriers-text: #97C459;

        --tag-frantic-bg: rgba(99,56,6,0.2);
        --tag-frantic-border: #854F0B;
        --tag-frantic-text: #FAC775;

        --tag-lore-bg: rgba(74,27,12,0.2);
        --tag-lore-border: #993C1D;
        --tag-lore-text: #F0997B;
      }
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: ui-monospace, 'Cascadia Code', Menlo, monospace;
      min-height: 100vh;
      padding: 0;
    }

    /* Layout */
    .site-header {
      border-bottom: 0.5px solid var(--border-mid);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }

    .site-name {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 18px;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .site-nav {
      display: flex;
      gap: 1.5rem;
    }

    .site-nav a {
      font-size: 11px;
      color: var(--text-tertiary);
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.15s;
    }

    .site-nav a:hover, .site-nav a.active { color: var(--text-primary); }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    /* Page header */
    .page-header {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 0.5px solid var(--border);
    }

    .page-title {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 42px;
      letter-spacing: -1px;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      line-height: 1.1;
    }

    .page-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 520px;
    }

    .page-meta {
      margin-top: 1rem;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      align-items: center;
    }

    .filter-label {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-right: 4px;
    }

    .filter-btn {
      font-family: ui-monospace, 'Cascadia Code', Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 5px 12px;
      border-radius: 2px;
      border: 0.5px solid var(--border-mid);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .filter-btn:hover {
      background: var(--bg-card);
      color: var(--text-primary);
      border-color: var(--border-mid);
    }

    .filter-btn.active {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
    }

    /* Signal count */
    .signal-count {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Signals grid */
    .signals-grid {
      display: grid;
      gap: 1px;
      background: var(--border);
      border: 0.5px solid var(--border);
    }

    .signal-card {
      background: var(--bg-card);
      padding: 1.5rem 1.75rem;
      transition: background 0.1s;
      animation: fadeIn 0.3s ease both;
    }

    .signal-card:hover { background: var(--bg); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .signal-card.hidden { display: none; }

    .signal-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }

    .signal-title {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 17px;
      line-height: 1.5;
      color: var(--text-primary);
      flex: 1;
      text-decoration: none;
      display: block;
    }

    .signal-title:hover { text-decoration: underline; text-decoration-color: var(--border-mid); }

    .signal-date {
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      white-space: nowrap;
      padding-top: 4px;
      text-transform: uppercase;
    }

    .signal-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .signal-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      border: 0.5px solid;
      font-family: ui-monospace, 'Cascadia Code', Menlo, monospace;
    }

    .tag-semantic { color: var(--tag-semantic-text); border-color: var(--tag-semantic-border); background: var(--tag-semantic-bg); }
    .tag-barriers { color: var(--tag-barriers-text); border-color: var(--tag-barriers-border); background: var(--tag-barriers-bg); }
    .tag-frantic  { color: var(--tag-frantic-text);  border-color: var(--tag-frantic-border);  background: var(--tag-frantic-bg); }
    .tag-lore     { color: var(--tag-lore-text);     border-color: var(--tag-lore-border);     background: var(--tag-lore-bg); }

    .signal-source {
      font-size: 11px;
      color: var(--text-tertiary);
      font-style: italic;
    }

    /* Loading & empty states */
    .state-message {
      padding: 4rem 2rem;
      text-align: center;
      font-size: 13px;
      color: var(--text-tertiary);
      border: 0.5px solid var(--border);
      background: var(--bg-card);
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* Footer */
    .site-footer {
      border-top: 0.5px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .site-header { padding: 1rem; }
      .container { padding: 2rem 1rem 4rem; }
      .page-title { font-size: 32px; }
      .signal-card { padding: 1.25rem; }
      .site-nav { display: none; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-name">the weft</a>
    <nav class="site-nav">
      <a href="/index.html" class="active">Signals</a>
      <a href="/blog.html">Writing</a>
      <a href="/about.html">About</a>
    </nav>
  </header>

  <main class="container">

    <div class="page-header">
      <h1 class="page-title">Signals</h1>
      <p class="page-desc">From the edges of content strategy and design. Things worth paying attention to.</p>
      <p class="page-meta" id="total-count">Loading...</p>
    </div>

    <div class="filter-bar">
      <span class="filter-label">Filter</span>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="The semantic layer">The semantic layer</button>
      <button class="filter-btn" data-filter="Barriers">Barriers</button>
      <button class="filter-btn" data-filter="Frantic workforce">Frantic workforce</button>
      <button class="filter-btn" data-filter="Lore">Lore</button>
    </div>

    <p class="signal-count" id="visible-count"></p>

    <div id="signals-container">
      <div class="state-message">
        <span class="loading-dots">Loading signals</span>
      </div>
    </div>

  </main>

  <footer class="site-footer">
    theweft.net &mdash; content strategy &amp; public services
  </footer>

  <script>
    const WORKER_URL = 'https://notion-signals-proxy.256ysfqc5d.workers.dev/';

    const TAG_MAP = {
      'The semantic layer': 'semantic',
      'Barriers': 'barriers',
      'Frantic workforce': 'frantic',
      'Lore': 'lore'
    };

    function tagClass(name) {
      return 'tag-' + (TAG_MAP[name] || 'lore');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
    }

    function slugify(name) {
      return name.toLowerCase().replace(/\s+/g, '-');
    }

    function extractTitle(page) {
      const titleProp = page.properties.Name || page.properties.Title;
      if (!titleProp) return 'Untitled';
      const rich = titleProp.title || [];
      return rich.map(r => r.plain_text).join('') || 'Untitled';
    }

    function extractTags(page) {
      const cat = page.properties.Category;
      if (!cat || !cat.multi_select) return [];
      return cat.multi_select.map(t => t.name);
    }

    function extractURL(page) {
      const link = page.properties.Link;
      if (!link) return null;
      if (link.url) return link.url;
      if (link.rich_text && link.rich_text.length > 0) return link.rich_text[0].plain_text;
      return null;
    }

    function extractSource(page) {
      const src = page.properties.Source;
      if (!src) return null;
      if (src.rich_text && src.rich_text.length > 0) return src.rich_text.map(r => r.plain_text).join('');
      return null;
    }

    function extractDate(page) {
      const created = page.properties.Created;
      if (!created) return page.created_time || null;
      if (created.date) return created.date.start;
      if (created.created_time) return page.created_time;
      return page.created_time || null;
    }

    function renderSignals(pages) {
      const container = document.getElementById('signals-container');
      const totalCount = document.getElementById('total-count');

      if (!pages || pages.length === 0) {
        container.innerHTML = '<div class="state-message">No signals found.</div>';
        return;
      }

      totalCount.textContent = pages.length + ' signals';

      const grid = document.createElement('div');
      grid.className = 'signals-grid';

      pages.forEach((page, i) => {
        const title = extractTitle(page);
        const tags = extractTags(page);
        const url = extractURL(page);
        const source = extractSource(page);
        const date = extractDate(page);

        // only show cards that have at least one of our four tags
        const knownTags = tags.filter(t => TAG_MAP[t]);
        if (knownTags.length === 0) return;

        const card = document.createElement('div');
        card.className = 'signal-card';
        card.dataset.tags = knownTags.join('|||');
        card.style.animationDelay = (i * 20) + 'ms';

        const titleEl = url
          ? `<a href="${url}" target="_blank" rel="noopener noreferrer" class="signal-title">${title}</a>`
          : `<span class="signal-title">${title}</span>`;

        const tagsEl = knownTags.map(t =>
          `<span class="tag ${tagClass(t)}">${t}</span>`
        ).join('');

        const sourceEl = source
          ? `<span class="signal-source">${source}</span>`
          : '';

        card.innerHTML = `
          <div class="signal-top">
            ${titleEl}
            <span class="signal-date">${formatDate(date)}</span>
          </div>
          <div class="signal-bottom">
            <div class="signal-tags">${tagsEl}</div>
            ${sourceEl}
          </div>
        `;

        grid.appendChild(card);
      });

      container.innerHTML = '';
      container.appendChild(grid);
      updateVisibleCount();
    }

    function updateVisibleCount() {
      const visible = document.querySelectorAll('.signal-card:not(.hidden)');
      const countEl = document.getElementById('visible-count');
      if (countEl) countEl.textContent = visible.length + ' showing';
    }

    // Filtering
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        document.querySelectorAll('.signal-card').forEach(card => {
          const tags = card.dataset.tags.split('|||');
          const show = filter === 'all' || tags.includes(filter);
          card.classList.toggle('hidden', !show);
        });
        updateVisibleCount();
      });
    });

    // Fetch from Notion via Worker
    async function loadSignals() {
      try {
        const res = await fetch(WORKER_URL);
        if (!res.ok) throw new Error('Worker responded with ' + res.status);
        const data = await res.json();
        renderSignals(data.results || []);
      } catch (err) {
        document.getElementById('signals-container').innerHTML =
          '<div class="state-message">Could not load signals. Please try again shortly.</div>';
        console.error(err);
      }
    }

    loadSignals();
  </script>

</body>
</html>
